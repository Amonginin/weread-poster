name: Generate WeRead Heatmap

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写权限以允许将生成的 SVG push 回仓库

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Heatmap
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: |
          # 运行微信读书热力图生成脚本
          # --theme rose 表示渲染玫瑰粉主题
          # --with-animation 表示添加淡入动效
          # --output 指定保存的文件名称为 weread_heatmap.svg
          python -m weread_poster --theme rose --with-animation --output weread_heatmap.svg

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add weread_heatmap.svg
          # 如果文件没有变化，commit 会返回 1。使用 || exit 0 确保其在无变化时不会报错中止
          git commit -m "chore: update WeChat Reading heatmap [skip ci]" || exit 0
          git push
